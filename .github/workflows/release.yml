name: publish extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Extract Tag Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update package.json Version
        run: npm version "${{ steps.get_version.outputs.VERSION }}" --no-git-tag-version

      - name: Commit Version Update
        run: |
          git config user.name "Sam-Armstrong"
          git config user.email "samuel_e_armstrong@yahoo.co.uk"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: bump version number to ${{ steps.get_version.outputs.VERSION }}"
          git push

      - name: Install Publisher Tools
        run: npm install -g @vscode/vsce ovsx

      - name: Package Extension
        run: vsce package --out extension.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --packagePath extension.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX Registry
        env:
          OPENVSX_TOKEN: ${{ secrets.OPENVSX_TOKEN }}
        run: ovsx publish extension.vsix -p "$OPENVSX_TOKEN"
